<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO & Open Graph -->
  <title>Website Advanced Gw</title>
  <meta name="description" content="Ini adalah contoh website HTML level dewa.">
  <meta property="og:title" content="Website Advanced Gw">
</head>
<body>

  <!-- Semantic Tag -->
  <header>
    <h1>Selamat Datang di Web Mastery</h1>
    <hr>
  </header>

  <main>
    <!-- Multimedia Embed -->
    <section>
      <h2>Video Referensi Belajar</h2>
      <iframe width="560" height="315" src="https://www.youtube.com/embed/qz0aGYrrlhU" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
    </section>

    <!-- Interactive HTML -->
    <section>
      <h2>Koleksi Chord Rahasia</h2>
      <details>
        <summary>Lihat Kunci Gitar</summary>
        <p><strong>C - G - Am - F</strong></p>
      </details>
    </section>

    <!-- Form + Accessibility -->
    <section>
      <h2>Kirim Pesan</h2>
      <form action="/kirim" method="POST">
        <div>
          <label for="pesanUser">Pesan:</label><br>
          <input type="text" id="pesanUser" required aria-label="Kolom isian pesan">
        </div>
        <br>
        <button type="submit">Kirim Sekarang</button>
      </form>
    </section>
  </main>

</body>
</html>
